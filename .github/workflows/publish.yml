name: Update Dashboard

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual runs from the Actions tab

permissions:
  contents: write # Needed to commit the updated DB back to the repo
  pages: write # Needed to deploy to GitHub Pages
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        # ── .Set up R ────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libxml2-dev

      - name: Restore R packages
        run: |
          Rscript -e "install.packages('renv')"
          Rscript -e "renv::restore()"

      # ── 2. Python setup ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Debug - List files
        run: ls -R

      # ── 3. Fetch YouTube data ──────────────────────────────────────
      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_youtube_data_updated.py

      # ── 4. Commit updated DB back to repo ─────────────────────────
      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eotc_youtube_data.db
          # Only commit if the DB actually changed
          git diff --cached --quiet || git commit -m "chore: update YouTube data [skip ci]"
          git push

      # ── 5. Quarto setup ───────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ── 6. Render dashboard ───────────────────────────────────────
      - name: Render Quarto site
        run: quarto render

      # ── 7. Deploy to GitHub Pages ─────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
