name: Update Dashboard

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual runs from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages # <-- Required for deploy-pages@v4

    steps:
      # ── 1️⃣ Checkout repository ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2️⃣ Set up R and restore renv dependencies ───────────────
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-renv@v2

      # ── 3️⃣ Set up Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4️⃣ Fetch YouTube data ────────────────────────────────────
      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_youtube_data_updated.py

      # ── 5️⃣ Commit updated database (only if changed) ───────────
      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eotc_youtube_data.db
          git diff --cached --quiet || git commit -m "chore: update YouTube data [skip ci]"
          git push

      # ── 6️⃣ Set up Quarto ─────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ── 7️⃣ Render the full multi-page site ──────────────────────
      - name: Render Quarto site
        run: quarto render

      # ── 8️⃣ Deploy to GitHub Pages ───────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
